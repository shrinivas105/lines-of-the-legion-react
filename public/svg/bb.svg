<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <g fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Bishop's Mitre / Head -->
    <path d="M 22 6 L 15 10.5 L 15 17 Q 22 19.5 29 17 L 29 10.5 L 22 6 Z" fill="#212121" />
    <path d="M 22 8 L 22 17" stroke="#000000" stroke-width="1" />
    
    <!-- Top Ornament -->
    <circle cx="22" cy="5" r="1.5" fill="#D4AF37" />
    
    <!-- Neck Armor -->
    <path d="M 18 19 L 26 19 Q 22 21 18 19 Z" fill="#424242" />
    
    <!-- Torso / Lorica (Brought down to Y=35 to touch the base) -->
    <path d="M 16 21 L 13.5 35 L 30.5 35 L 28 21 Z" fill="#303030" />
    
    <!-- Decorative Mantle / Clerical Vestment (Brought down to touch base) -->
    <path d="M 16 21 C 13 23.5, 13 32.5, 15.5 35 L 28.5 35 C 31 32.5, 31 23.5, 28 21 Q 22 23.5 16 21 Z" fill="#AA8010" />
    
    <!-- Pteruges -->
    <path d="M 16.5 31 L 16.5 35 M 20 31 L 20 35 M 24 31 L 24 35 M 27.5 31 L 27.5 35" stroke="#000000" stroke-width="1" />
    
    <!-- Pedestal Base (Starting at Y=35) -->
    <path d="M 12 35 L 32 35 L 34 39 L 10 39 Z" fill="#212121" />
    <rect x="8" y="39" width="28" height="3" rx="1" fill="#424242" />
    
  </g>
</svg>
